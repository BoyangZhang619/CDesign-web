<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feFlood flood-color="white" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="healthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E1F5FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCE4EC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景装饰圆点 -->
  <circle cx="80" cy="80" r="8" fill="#E0F2F1" opacity="0.6"/>
  <circle cx="340" cy="320" r="6" fill="#FCE4EC" opacity="0.5"/>
  
  <!-- 主要形状：健康心脉 -->
  <!-- 心形主体 -->
  <path d="M 200 320 C 200 320, 120 260, 120 200 C 120 160, 150 140, 180 140 C 200 140, 200 160, 200 160 C 200 160, 200 140, 220 140 C 250 140, 280 160, 280 200 C 280 260, 200 320, 200 320 Z" 
        fill="#FCE4EC" filter="url(#softGlow)" opacity="0.9"/>
  
  <!-- 心形内部高光 -->
  <ellipse cx="200" cy="180" rx="35" ry="40" fill="#FFF9C4" opacity="0.4"/>
  
  <!-- 脉搏波形线条 -->
  <path d="M 50 200 L 80 200 L 90 190 L 100 210 L 110 190 L 120 210 L 140 200 L 170 200" 
        stroke="#E0F2F1" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- 脉搏点 -->
  <circle cx="60" cy="200" r="4" fill="#E0F2F1" opacity="0.6"/>
  <circle cx="175" cy="200" r="3.5" fill="#E0F2F1" opacity="0.5"/>
  
  <!-- 右侧装饰波浪 -->
  <path d="M 250 100 Q 270 90, 280 110 Q 290 130, 310 120 Q 330 110, 340 130" 
        stroke="#E1F5FE" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- 底部装饰元素：健康指标 -->
  <rect x="140" y="360" width="120" height="3" rx="1.5" fill="url(#healthGradient)" opacity="0.7"/>
  <circle cx="155" cy="360" r="2.5" fill="#FFF9C4" opacity="0.8"/>
  <circle cx="200" cy="360" r="2" fill="#E1F5FE" opacity="0.7"/>
  <circle cx="245" cy="360" r="2.5" fill="#FCE4EC" opacity="0.75"/>

</svg>
