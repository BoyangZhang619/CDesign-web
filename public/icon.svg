<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feFlood flood-color="white" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#FFFBF5" />

  <circle cx="100" cy="100" r="60" stroke="#E0F2F1" stroke-width="2" fill="none" opacity="0.7"/>
  
  <path d="M150 220 C150 198, 175 180, 200 180 C215 180, 230 188, 238 200 C245 195, 255 195, 262 200 C270 198, 280 200, 285 208 C295 210, 300 220, 300 230 L150 230 Z" 
        fill="#FCE4EC" filter="url(#softGlow)"/>

  <path d="M100 250 C100 230, 120 215, 145 215 C160 215, 175 222, 182 232 C190 228, 200 228, 208 232 C215 230, 225 232, 230 240 C240 242, 245 250, 245 260 L100 260 Z" 
        fill="#E1F5FE" opacity="0.8" filter="url(#softGlow)"/>

  <circle cx="320" cy="120" r="25" fill="#FFF9C4" opacity="0.9" filter="url(#softGlow)"/>

  <rect x="150" y="320" width="100" height="4" rx="2" fill="#E0F2F1" />
  <rect x="180" y="335" width="40" height="4" rx="2" fill="#FCE4EC" />

</svg>
